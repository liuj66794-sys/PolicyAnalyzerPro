name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Trea_project_test/policy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install lint dependencies
        run: pip install flake8 ruff
      - name: Run ruff
        run: ruff check . --output-format=text --no-fix || true

  test:
    name: Test
    runs-on: windows-latest
    needs: lint
    defaults:
      run:
        working-directory: Trea_project_test/policy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install pytest pytest-cov psutil
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  report:
    name: Report
    runs-on: windows-latest
    needs: [test]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "Test result: ${{ needs.test.result }}"