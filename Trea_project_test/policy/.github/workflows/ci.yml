name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 ruff

      - name: Run ruff
        run: |
          ruff check . --output-format=text --no-fix || true

      - name: Run flake8
        run: |
          flake8 . --count --show-source --statistics --exclude=.git,__pycache__,.venv || true

  test:
    name: Test
    runs-on: windows-latest
    needs: lint
    strategy:
      matrix:
        test-group:
          - name: Core Flows
            tests: tests/test_single_analysis_flow.py tests/test_comparison_flow.py tests/test_batch_flow.py
          - name: Export & Diagnostics
            tests: tests/test_export_flow.py tests/test_comparison_export_flow.py tests/test_document_diagnostics_flow.py
          - name: Quality & Eval
            tests: tests/test_quality_metrics.py tests/test_algorithms_business_eval.py tests/test_algorithms_golden_set.py
          - name: NFR Performance
            tests: tests/test_nfr_performance.py
          - name: Release & Diagnostics
            tests: tests/test_release_artifacts_consistency.py tests/test_release_candidate_consistency.py tests/test_diagnostics_hardening_flow.py

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache jieba
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Temp\jieba.cache
          key: ${{ runner.os }}-jieba-cache

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov psutil

      - name: Run tests
        run: |
          python -m pytest ${{ matrix.test-group.tests }} -v --tb=short --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.test-group.name }}
          path: coverage.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: ${{ matrix.test-group.name }}
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.test-group.name }}
          path: |
            test-results.xml
           *.log
          retention-days: 7
          ignore-no-files: true

  integration:
    name: Integration
    runs-on: windows-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run single analysis flow test
        run: |
          python -m pytest tests/test_single_analysis_flow.py -v --tb=short

      - name: Run regression test
        run: |
          python -m pytest tests/regression/test_all_packages.py -v --tb=short

      - name: Verify main.py entry point
        run: |
          python main.py --help

      - name: Verify CLI mode
        run: |
          echo "quit" | python main.py --cli

  gui:
    name: GUI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Qt
        run: |
          pip install PySide6

      - name: Check Qt environment
        run: |
          python scripts/check_qt_env.py

      - name: Test Qt GUI module import
        run: |
          python -c "from ui.qt_main_window import QtMainWindow; print('Qt GUI import OK')"

  report:
    name: Report
    runs-on: windows-latest
    needs: [lint, test, integration, gui]
    if: always()
    steps:
      - name: Download all coverage
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-reports
          merge-multiple: true

      - name: Generate coverage summary
        run: |
          echo "## CI Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| GUI | ${{ needs.gui.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage Reports" >> $GITHUB_STEP_SUMMARY
          echo "Coverage reports are available in the Artifacts section." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[![codecov](https://codecov.io/gh/liuj66794-sys/PolicyAnalyzerPro/branch/main/graph/badge.svg)](https://codecov.io/gh/liuj66794-sys/PolicyAnalyzerPro)" >> $GITHUB_STEP_SUMMARY

  # Optional: Notify on failure
  notify-failure:
    name: Notify Failure
    runs-on: windows-latest
    needs: [lint, test, integration, gui]
    if: failure()
    steps:
      - name: Log failure
        run: |
          echo "CI pipeline failed. Please check the logs for details."
          echo "Failed jobs: lint=${{ needs.lint.result }}, test=${{ needs.test.result }}, integration=${{ needs.integration.result }}, gui=${{ needs.gui.result }}"
